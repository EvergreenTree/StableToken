run_name: all_inference_smoke
seed: 42
device: auto
checkpoint:
  repo_id: tencent/StableToken
  local_dir: checkpoints/StableToken
  revision: dd19e26b6e7a2ffcc8523d15b80238175c69a2b6
  allow_patterns:
    - tokenizer/*
batch_size: 8
output_root: experiments/runs
tasks:
  - sanity
  - degradation
  - distribution
data:
  sources:
    - name: fleurs_fr_dev100
      type: jsonl
      path: /data/speech2text/Qwen3-ASR/finetuning/eval_slices/fleurs_fr_dev100.jsonl
      language: fr
      max_items: 5
    - name: cv21_zh_dev100
      type: jsonl
      path: /data/speech2text/Qwen3-ASR/finetuning/eval_slices/cv21_zh_dev100.jsonl
      language: zh
      max_items: 5
sanity:
  target_duration_seconds: 30.0
  expected_frame_rate: 25.0
  expected_vocab_size: 8192
  corruption:
    type: gaussian
    snr_db: 25
degradation:
  corruptions:
    - name: gaussian_25db
      type: gaussian
      snr_db: 25
    - name: pink_22db
      type: pink
      snr_db: 22
    - name: brown_16db
      type: brown
      snr_db: 16
    - name: bitcrush_10bit
      type: bit_crush
      bit_depth: 10
    - name: telephone_bandpass
      type: telephone_bandpass
    - name: competing_speech_16db
      type: competing_speech
      snr_db: 16
distribution:
  corruptions:
    - name: clean
      type: clean
    - name: gaussian_25db
      type: gaussian
      snr_db: 25
