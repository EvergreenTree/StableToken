run_name: training_smoke
seed: 42
device: cuda
output_root: experiments/training_runs
data:
  train_file: /data/speech2text/Qwen3-ASR/finetuning/data/fleurs-fr/train/train.jsonl
  eval_file: /data/speech2text/Qwen3-ASR/finetuning/data/fleurs-fr/dev/dev.jsonl
  language: fr
  max_train_items: 8
  max_eval_items: 2
  sample_rate: 16000
training:
  base_model: openai/whisper-tiny
  batch_size: 1
  grad_accum: 1
  max_steps: 2
  learning_rate: 1.5e-5
  warmup_steps: 0
  weight_decay: 0.0
  grad_clip: 1.0
  bf16: true
  gradient_checkpointing: false
  save_steps: 2
  logging_steps: 1
  consensus_loss_weight: 0.25
  commitment_loss_weight: 0.25
  codebook_entropy_loss_weight: 1.0
  augmentation:
    enabled: true
    choices:
      - type: gaussian
        min_snr_db: 20
        max_snr_db: 25
variant:
  name: smoke_l2_n3
  quantize_position: 2
  pooling_position: 2
  pooling_kernel_size: 2
  quantize_vocab_size: 8192
  num_voters: 3
  num_clean_input: 2
