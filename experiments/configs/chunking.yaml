run_name: chunking_smoke
seed: 42
device: auto
checkpoint:
  repo_id: tencent/StableToken
  local_dir: checkpoints/StableToken
  revision: dd19e26b6e7a2ffcc8523d15b80238175c69a2b6
  allow_patterns:
    - tokenizer/*
batch_size: 4
output_root: experiments/runs
tasks:
  - chunking
data:
  sources:
    - name: fleurs_fr_dev100
      type: jsonl
      path: /data/speech2text/Qwen3-ASR/finetuning/eval_slices/fleurs_fr_dev100.jsonl
      language: fr
      max_items: 8
chunking:
  long_audio_count: 1
  target_long_seconds: 75
  frame_rate: 25.0
  policies:
    - name: nonoverlap_30s
      window_seconds: 30
      stride_seconds: 30
    - name: stride_15s
      window_seconds: 30
      stride_seconds: 15
    - name: stride_5s
      window_seconds: 30
      stride_seconds: 5
    - name: stride_1s
      window_seconds: 30
      stride_seconds: 1
      max_windows: 24
  boundary_windows_seconds:
    - 0.5
    - 1.0
    - 2.0
    - 5.0
